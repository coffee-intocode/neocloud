version: 1

applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - npm ci --cache .npm --prefer-offline
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .npm/**/*
    appRoot: frontend

customHeaders:
  - pattern: '**/*'
    headers:
      - key: Cache-Control
        value: 'public, max-age=31536000, immutable'
  - pattern: index.html
    headers:
      - key: Cache-Control
        value: 'no-cache, no-store, must-revalidate'

customRules:
  - source: /api/<*>
    target: https://d24hs012u36xfh.cloudfront.net/api/<*>
    status: 200
  - source: </^[^.]+$|\.(?!(css|gif|ico|jpg|js|png|txt|svg|woff|woff2|ttf|map|json)$)([^.]+$)/>
    target: /index.html
    status: 200
